services:
  db:
    image: mysql:8.0
    container_name: invoice_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invoice
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: invoice_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_DSN: root:root@tcp(db:3306)/invoice?parseTime=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
